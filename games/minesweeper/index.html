<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>深渊探雷：达克霍姆的试炼 ♂</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dungeon-container">
        <h1 class="title">深渊探雷 <span>♂ Deep Dark Mines</span></h1>
        
        <div class="control-panel">
            <select id="difficulty" class="dark-select">
                <option value="easy">迷途羔羊 (9x9, 10陷阱)</option>
                <option value="medium" selected>百战猛男 (16x16, 40陷阱)</option>
                <option value="hard">地牢领主 (30x16, 99陷阱)</option>
            </select>
            <button id="reset-btn" class="dark-btn">⛓️ 重置地牢 ⛓️</button>
        </div>

        <div class="stats">
            <div class="stat-box">剩余陷阱: <span id="mines-count">0</span></div>
            <div class="stat-box" id="game-status">探险进行中...</div>
            <div class="stat-box">存活时间: <span id="timer">0</span>s</div>
        </div>

        <div id="board" class="board" oncontextmenu="return false;"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
